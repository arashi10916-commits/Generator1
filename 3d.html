<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 積木視圖出題器 - 專業典雅版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Noto Serif TC', serif; 
            background-color: #f8f6f2; 
            color: #444;
        }
        
        /* 老師控制台 - 緊湊版 */
        .controls { 
            position: absolute; 
            bottom: 15px; 
            left: 15px; 
            z-index: 100; 
            width: 280px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid #e2dfd8;
            padding: 14px 16px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* 左上角三視圖佈局 */
        .l-view-layout {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 80;
            display: grid;
            grid-template-areas: 
                "top empty"
                "front right";
            gap: 12px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top left;
        }

        /* 練習模式：將三視圖置中放大 */
        .full-view-mode {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(2.4) !important;
            transform-origin: center center;
        }

        .hidden-view-mode {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8) translateY(-20px);
        }

        .view-box { display: flex; flex-direction: column; align-items: center; }
        .view-canvas { 
            border: 1px solid #d1cdc2; 
            background: #ffffff; 
            width: 140px;
            height: 140px;
            transition: width 0.5s, height 0.5s;
        }

        .label-tag {
            font-size: 12px;
            letter-spacing: 0.05em;
            color: #8c887d;
            margin-bottom: 4px;
            font-weight: bold;
        }

        #quizOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f8f6f2;
            display: none;
            z-index: 50;
        }

        button { transition: all 0.2s ease; }
        .btn-main { background: #6b705c; color: #fff; }
        .btn-main:hover { background: #8a8d7a; }

        input[type="number"] {
            background: #fff;
            border: 1px solid #d1cdc2;
            border-radius: 4px;
            padding: 1px 4px;
            font-family: inherit;
        }

        .active-mode {
            background: #575c4b !important;
            color: #fff !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .mode-btn {
            background: #f0ede6;
            color: #7a766a;
        }
    </style>
</head>
<body>

<div id="quizOverlay"></div>

<div class="controls">
    <div class="panel">
        <h1 class="text-base font-bold mb-3 text-stone-700 border-l-4 border-stone-400 pl-3 leading-none">空間幾何觀察</h1>
        
        <div class="flex flex-col gap-2">
            <!-- 題目控制區 -->
            <div class="flex items-center gap-2">
                <div class="flex items-center bg-stone-100 px-2 py-1 rounded border border-stone-200 flex-1">
                    <span class="text-[11px] text-stone-500 font-bold mr-2 whitespace-nowrap">上限</span>
                    <input type="number" id="blockLimit" value="10" min="1" max="27" class="w-10 bg-transparent text-xs font-bold outline-none">
                </div>
                <button onclick="generateRandomPuzzle()" class="btn-main px-3 py-1.5 rounded text-xs font-bold flex-[2]">隨機出題</button>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="resetScene()" class="border border-stone-300 py-1 rounded text-[11px] text-stone-600 hover:bg-stone-50">清空積木</button>
                <button onclick="resetCamera()" class="border border-stone-300 py-1 rounded text-[11px] text-stone-600 hover:bg-stone-50">重置視點</button>
            </div>
            
            <!-- 模式切換區 -->
            <div class="grid grid-cols-2 gap-2">
                <button id="btnStudentMode" onclick="setMode('student')" class="mode-btn py-1.5 rounded text-[11px] font-bold">
                    練習模式
                </button>
                <button id="btnHideMode" onclick="setMode('hide')" class="mode-btn py-1.5 rounded text-[11px] font-bold">
                    隱藏視圖
                </button>
            </div>
            
            <!-- 輔助設定 -->
            <div class="flex items-center justify-around mt-1 py-1 border-t border-stone-200">
                <div class="flex items-center gap-1">
                    <span class="text-[10px] text-stone-400 font-bold">顏色</span>
                    <button onclick="toggleColorMode()" class="text-[10px] text-stone-600 underline" id="colorModeBtn">開</button>
                </div>
                <div class="w-[1px] h-3 bg-stone-200"></div>
                <div class="flex items-center gap-1">
                    <span class="text-[10px] text-stone-400 font-bold">指引</span>
                    <button onclick="toggleDirectionGuides()" class="text-[10px] text-stone-600 underline" id="dirGuideBtn">開</button>
                </div>
            </div>
        </div>

        <div class="mt-2 text-[10px] text-stone-400 text-center">
            左鍵：增/刪 | 右鍵：平移 | 滾輪：縮放
        </div>
    </div>
</div>

<div id="viewContainer" class="l-view-layout">
    <div class="view-box area-top" style="grid-area: top;">
        <span class="label-tag">俯視 (Top)</span>
        <canvas id="topView" class="view-canvas"></canvas>
    </div>
    <div class="view-box area-front" style="grid-area: front;">
        <span class="label-tag">前視 (Front)</span>
        <canvas id="frontView" class="view-canvas"></canvas>
    </div>
    <div class="view-box area-right" style="grid-area: right;">
        <span class="label-tag">右視 (Right)</span>
        <canvas id="rightView" class="view-canvas"></canvas>
    </div>
</div>

<script>
    let scene, camera, renderer, raycaster, mouse;
    let blocks = [];
    let isMultiColor = true;
    let currentActiveMode = 'none';
    let showGuides = true;
    let directionGuides = new THREE.Group();

    let views = {
        top: { renderer: null, camera: null, canvasId: 'topView' },
        front: { renderer: null, camera: null, canvasId: 'frontView' },
        right: { renderer: null, camera: null, canvasId: 'rightView' }
    };

    const THEME = {
        bg: 0xf8f6f2,
        base: 0xd6d2c9,
        single: 0xf2efea, 
        top: 0xd98c8c,
        front: 0xedc988,
        right: 0x8cade0,
        lineDark: 0x1a1a1a,
        lineLight: 0x555555,
        guideFront: 0xe0a050, 
        guideRight: 0x6090c0
    };

    window.onload = () => {
        init();
        animate();
        generateRandomPuzzle();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(THEME.bg);

        const aspect = window.innerWidth / window.innerHeight;
        const d = 5.5;
        camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        resetCamera();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        const plane = new THREE.Mesh(
            new THREE.BoxGeometry(3.05, 0.05, 3.05),
            new THREE.MeshPhongMaterial({ color: THEME.base })
        );
        plane.position.y = -0.525;
        plane.name = "ground";
        scene.add(plane);

        const grid = new THREE.GridHelper(3, 3, 0xbfbbb0, 0xe2dfd8);
        grid.position.y = -0.5;
        scene.add(grid);

        createDirectionGuides();
        scene.add(directionGuides);
        setupMiniViews();

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('resize', onWindowResize);
    }

    function createDirectionGuides() {
        directionGuides.clear();
        directionGuides.add(createTextLabel(THEME.guideFront, "前").translateZ(2.8).translateY(-0.4));
        directionGuides.add(createTextLabel(THEME.guideRight, "右").translateX(2.8).translateY(-0.4));
    }

    function createTextLabel(color, text) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
        ctx.font = 'bold 80px Noto Serif TC, serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
        sprite.scale.set(1.2, 1.2, 1);
        return sprite;
    }

    function toggleDirectionGuides() {
        showGuides = !showGuides;
        directionGuides.visible = showGuides;
        document.getElementById('dirGuideBtn').innerText = showGuides ? '開' : '關';
    }

    function setupMiniViews() {
        const size = 140;
        const vD = 4.8; 
        const createOrtho = () => new THREE.OrthographicCamera(-vD/2, vD/2, vD/2, -vD/2, 0.1, 100);

        views.top.camera = createOrtho();
        views.top.camera.position.set(0, 10, 0);
        views.top.camera.lookAt(0, 0, 0);

        views.front.camera = createOrtho();
        views.front.camera.position.set(0, 1, 10);
        views.front.camera.lookAt(0, 1, 0);

        views.right.camera = createOrtho();
        views.right.camera.position.set(10, 1, 0);
        views.right.camera.lookAt(0, 1, 0);

        Object.values(views).forEach(v => {
            v.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById(v.canvasId), antialias: true });
            v.renderer.setClearColor(0xffffff);
            v.renderer.setSize(size, size);
        });
    }

    function createBlock(x, y, z) {
        if (blocks.some(b => b.position.x === x && b.position.y === y && b.position.z === z)) return;

        let materials;
        if (isMultiColor) {
            materials = [
                new THREE.MeshPhongMaterial({ color: THEME.right }), 
                new THREE.MeshPhongMaterial({ color: 0xfefefe }),
                new THREE.MeshPhongMaterial({ color: THEME.top }), 
                new THREE.MeshPhongMaterial({ color: 0xfefefe }),
                new THREE.MeshPhongMaterial({ color: THEME.front }),
                new THREE.MeshPhongMaterial({ color: 0xfefefe })
            ];
        } else {
            materials = new THREE.MeshPhongMaterial({ color: THEME.single });
        }

        const cube = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.98, 0.98), materials);
        cube.position.set(x, y, z);
        cube.isBlock = true;

        const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(cube.geometry),
            new THREE.LineBasicMaterial({ 
                color: isMultiColor ? THEME.lineLight : THEME.lineDark, 
                opacity: isMultiColor ? 0.3 : 1.0, 
                transparent: true 
            })
        );
        cube.add(edges);
        scene.add(cube);
        blocks.push(cube);
    }

    function setMode(mode) {
        currentActiveMode = (currentActiveMode === mode) ? 'none' : mode;

        const overlay = document.getElementById('quizOverlay');
        const container = document.getElementById('viewContainer');
        const btnStudent = document.getElementById('btnStudentMode');
        const btnHide = document.getElementById('btnHideMode');

        btnStudent.classList.remove('active-mode');
        btnHide.classList.remove('active-mode');
        container.classList.remove('full-view-mode', 'hidden-view-mode');
        overlay.style.display = 'none';

        if (currentActiveMode === 'student') {
            overlay.style.display = 'block';
            container.classList.add('full-view-mode');
            btnStudent.classList.add('active-mode');
        } else if (currentActiveMode === 'hide') {
            container.classList.add('hidden-view-mode');
            btnHide.classList.add('active-mode');
        }
    }

    function toggleColorMode() {
        isMultiColor = !isMultiColor;
        document.getElementById('colorModeBtn').innerText = isMultiColor ? '開' : '關';
        const currentPos = blocks.map(b => ({ x: b.position.x, y: b.position.y, z: b.position.z }));
        resetScene();
        currentPos.forEach(p => createBlock(p.x, p.y, p.z));
    }

    function generateRandomPuzzle() {
        resetScene();
        const limit = parseInt(document.getElementById('blockLimit').value) || 10;
        let count = 0;
        let coords = [];
        for (let x = -1; x <= 1; x++) for (let z = -1; z <= 1; z++) coords.push({x, z});
        coords.sort(() => Math.random() - 0.5);
        for (let coord of coords) {
            const h = Math.floor(Math.random() * 4);
            for (let y = 0; y < h; y++) {
                if (count < limit) { createBlock(coord.x, y, coord.z); count++; }
            }
        }
        if (blocks.length === 0) createBlock(0, 0, 0);
    }

    function resetScene() {
        blocks.forEach(b => scene.remove(b));
        blocks = [];
    }

    let theta = Math.PI / 4, phi = Math.PI / 6, radius = 16;
    let cameraOffset = new THREE.Vector3(-1.5, 0.8, 0);
    let zoomLevel = 5.5;

    function resetCamera() {
        theta = Math.PI/4; phi = Math.PI/6; zoomLevel = 5.5;
        cameraOffset.set(-1.5, 0.8, 0); updateCamera();
    }

    function onWheel(event) {
        if (currentActiveMode === 'student') return;
        event.preventDefault();
        zoomLevel = Math.max(2, Math.min(15, zoomLevel + (event.deltaY > 0 ? 0.5 : -0.5)));
        updateCameraProjection();
    }

    function updateCameraProjection() {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -zoomLevel * aspect; camera.right = zoomLevel * aspect;
        camera.top = zoomLevel; camera.bottom = -zoomLevel;
        camera.updateProjectionMatrix();
    }

    function onMouseDown(event) {
        if (currentActiveMode === 'student' || event.target !== renderer.domElement) return;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);
        const intersect = intersects.find(i => (i.object.isBlock || i.object.name === "ground") && !i.object.parent.isDirectionGuide);
        
        if (event.button === 0 && intersect) {
            if (intersect.object.isBlock) {
                let pos = intersect.object.position.clone().add(intersect.face.normal);
                if (validatePos(pos)) createBlock(pos.x, Math.round(pos.y), pos.z);
            } else {
                let pos = new THREE.Vector3(Math.round(intersect.point.x), 0, Math.round(intersect.point.z));
                if (validatePos(pos)) createBlock(pos.x, 0, pos.z);
            }
        } else if (event.button === 2 && intersect && intersect.object.isBlock) {
            scene.remove(intersect.object);
            blocks = blocks.filter(b => b !== intersect.object);
        }
    }

    function validatePos(pos) { return Math.abs(pos.x) <= 1 && pos.y >= 0 && pos.y < 3 && Math.abs(pos.z) <= 1; }

    let isRotating = false, isPanning = false, prevMouse = { x: 0, y: 0 };
    window.addEventListener('mousedown', (e) => { 
        if(e.button === 0) isRotating = true; if(e.button === 2) isPanning = true;
        prevMouse = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => { isRotating = false; isPanning = false; });
    window.addEventListener('mousemove', (e) => {
        const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
        if (currentActiveMode !== 'student') {
            if (isRotating) { theta -= dx * 0.01; phi = Math.max(0.1, Math.min(1.4, phi + dy * 0.01)); }
            else if (isPanning) {
                const s = 0.003 * zoomLevel;
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(new THREE.Vector3(0,0,0), camera.position).setY(0), new THREE.Vector3(0,1,0)).normalize();
                cameraOffset.add(right.multiplyScalar(-dx * s)).add(new THREE.Vector3(0,1,0).multiplyScalar(dy * s));
            }
            updateCamera();
        }
        prevMouse = { x: e.clientX, y: e.clientY };
    });

    function updateCamera() {
        const x = radius * Math.sin(theta) * Math.cos(phi), y = radius * Math.sin(phi), z = radius * Math.cos(theta) * Math.cos(phi);
        camera.position.set(x + cameraOffset.x, y + cameraOffset.y, z + cameraOffset.z);
        camera.lookAt(cameraOffset); updateCameraProjection();
    }

    function onWindowResize() { renderer.setSize(window.innerWidth, window.innerHeight); updateCameraProjection(); }
    function animate() {
        requestAnimationFrame(animate);
        if (currentActiveMode !== 'student') renderer.render(scene, camera);
        directionGuides.visible = false;
        Object.values(views).forEach(v => v.renderer.render(scene, v.camera));
        directionGuides.visible = showGuides;
    }
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
